name: La Petite Pipeline de Natanael

on:
  push:
    branches:
      - main
      - natanael

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # --- Connexion au registre Docker Hub ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_NC }}
          password: ${{ secrets.DOCKERHUB_TOKEN_NC }}

      # --- Build image backend ---
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME_NC }}/backend:latest ./backend

      # --- Build image frontend ---
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME_NC }}/frontend:latest ./frontend

      # --- Push backend ---
      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME_NC }}/backend:latest

      # --- Push frontend ---
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME_NC }}/frontend:latest
