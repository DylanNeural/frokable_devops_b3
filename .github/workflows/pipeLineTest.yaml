name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q

  frontend-tests-build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker-build-push:
    runs-on: ubuntu-24.04
    needs:
      - backend-tests
      - frontend-tests-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:${{ github.sha }}

  notify-ntfy:
    runs-on: ubuntu-24.04
    needs:
      - backend-tests
      - frontend-tests-build
      - docker-build-push
    if: always()
    steps:
      - name: Send ntfy notification
        env:
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          DEVOPS_COURSDYLAN: ${{ secrets.DEVOPS_COURSDYLAN }}
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests-build.result }}
          DOCKER_RESULT: ${{ needs.docker-build-push.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e

          STATUS="SUCCESS"
          TITLE="CI OK"
          PRIORITY="default"

          if [ "$BACKEND_RESULT" != "success" ] || [ "$FRONTEND_RESULT" != "success" ]; then
            STATUS="FAILED"
            TITLE="CI FAILED"
            PRIORITY="high"
          fi

          if [ "$DOCKER_RESULT" != "success" ] && [ "$DOCKER_RESULT" != "skipped" ]; then
            STATUS="FAILED"
            TITLE="CI FAILED"
            PRIORITY="high"
          fi

          MESSAGE="[$STATUS] $REPO on $BRANCH%0ABackend: $BACKEND_RESULT%0AFrontend: $FRONTEND_RESULT%0ADocker: $DOCKER_RESULT%0A$RUN_URL"

          curl -sS -X POST "$NTFY_SERVER/$DEVOPS_COURSDYLAN" \
            -H "Title: $TITLE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: github,ci" \
            -d "$MESSAGE"