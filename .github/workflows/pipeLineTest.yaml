name: CI Pipeline

on:
  push:
    branches:
      - dylan
      - master
  pull_request:
    branches:
      - dylan
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q

  frontend-tests-build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker-build-push:
    runs-on: ubuntu-24.04
    needs:
      - backend-tests
      - frontend-tests-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip docker push if secrets are missing
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN missing; skipping image build and push."

      - name: Setup Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-backend:${{ github.sha }}

      - name: Build and push frontend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://${{ secrets.VPS_HOST }}:8000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:${{ github.sha }}

  deploy-vps:
    runs-on: ubuntu-24.04
    needs:
      - docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.docker-build-push.result == 'success'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/devops-b3/frokable_devops_b3
            git fetch origin
            git reset --hard origin/master
            cat > .env <<'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

  notify-ntfy:
    runs-on: ubuntu-24.04
    needs:
      - backend-tests
      - frontend-tests-build
      - docker-build-push
      - deploy-vps
    if: always()
    steps:
      - name: Send ntfy notification
        env:
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC_X9K7Q2M4R8V1 }}
          BACKEND_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests-build.result }}
          DOCKER_RESULT: ${{ needs.docker-build-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy-vps.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e

          STATUS="SUCCESS"
          TITLE="CI OK"
          PRIORITY="default"

          if [ "$BACKEND_RESULT" != "success" ] || [ "$FRONTEND_RESULT" != "success" ]; then
            STATUS="FAILED"
            TITLE="CI FAILED"
            PRIORITY="high"
          fi

          if [ "$DOCKER_RESULT" != "success" ] && [ "$DOCKER_RESULT" != "skipped" ]; then
            STATUS="FAILED"
            TITLE="CI FAILED"
            PRIORITY="high"
          fi

          if [ "$DEPLOY_RESULT" != "success" ] && [ "$DEPLOY_RESULT" != "skipped" ]; then
            STATUS="FAILED"
            TITLE="CI FAILED"
            PRIORITY="high"
          fi

          MESSAGE="[$STATUS] $REPO on $BRANCH%0ABackend: $BACKEND_RESULT%0AFrontend: $FRONTEND_RESULT%0ADocker: $DOCKER_RESULT%0ADeploy: $DEPLOY_RESULT%0A$RUN_URL"

          curl -sS -X POST "$NTFY_SERVER/$NTFY_TOPIC" \
            -H "Title: $TITLE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: github,ci" \
            -d "$MESSAGE"