name: CI Pipeline

on:
  push:
    branches:
      - soulayman
      - master
  pull_request:
    branches:
      - soulayman
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q

  frontend-tests-build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker-build-push:
    runs-on: ubuntu-24.04
    needs:
      - backend-tests
      - frontend-tests-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_AS }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_AS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip docker push if secrets are missing
        if: env.DOCKERHUB_USERNAME_AS == '' || env.DOCKERHUB_TOKEN_AS == ''
        run: echo "DOCKERHUB_USERNAME_AS/DOCKERHUB_TOKEN_AS missing; skipping image build and push."

      - name: Setup Docker Buildx
        if: env.DOCKERHUB_USERNAME_AS != '' && env.DOCKERHUB_TOKEN_AS != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME_AS != '' && env.DOCKERHUB_TOKEN_AS != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_AS }}
          password: ${{ secrets.DOCKERHUB_TOKEN_AS }}

      - name: Build and push backend image
        if: env.DOCKERHUB_USERNAME_AS != '' && env.DOCKERHUB_TOKEN_AS != ''
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_AS }}/devops-b3-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME_AS }}/devops-b3-backend:${{ github.sha }}

      - name: Build and push frontend image
        if: env.DOCKERHUB_USERNAME_AS != '' && env.DOCKERHUB_TOKEN_AS != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-b3-frontend:${{ github.sha }}